<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Dashboard</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Fraunces:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="bai2.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Learning Dashboard</h1>
        <button class="btn-outline">Notifications</button>
      </header>

      <section class="card progress">
        <div>
          <h2>Progress Overview</h2>
          <p>2 courses active, 1 due this week.</p>
        </div>
        <span class="badge">Due Soon</span>
      </section>

      <div class="grid">
        <section class="card">
          <h2>Continue Learning</h2>

          <article class="item">
            <div>
              <h3>UX Writing Basics</h3>
              <p>Lesson 5 of 12</p>
            </div>
            <button class="btn">Resume</button>
          </article>

          <article class="item">
            <div>
              <h3>Design Systems</h3>
              <p>Lesson 3 of 8</p>
            </div>
            <button class="btn">Resume</button>
          </article>
        </section>

        <section class="card">
          <h2>Upcoming Tasks</h2>
          <ul class="tasks">
            <li>Quiz: Accessibility Basics</li>
            <li>Project: Travel App Wireframe</li>
            <li>Peer Review: Checkout Flow</li>
          </ul>
        </section>
      </div>
    </main>
  </body>
</html>
